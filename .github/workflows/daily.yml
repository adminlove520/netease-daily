name: 每日一歌

on:
  # 每天早上 9 点执行
  schedule:
    - cron: '0 1 * * *'  # UTC 9 点 = 北京时间 17 点
  # 也可以手动触发
  workflow_dispatch:

jobs:
  daily-song:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install cryptography requests

      - name: Run daily song
        run: |
          # 确保 secrets 目录存在
          mkdir -p secrets

          # 运行获取每日推荐（优先 cookie 文件，环境变量有值则覆盖）
          python3 scripts/netease_client.py daily